[workspace]
authors = ["wc-caldwell <clay.caldwell124@gmail.com>"]
channels = ["conda-forge"]
name = "WaterDig-AutoBAG"
platforms = ["osx-arm64", "linux-64", "win-64"]
version = "0.1.0"

[tasks]
lab = "jupyter lab --no-browser --port=8889"

[dependencies]
ipykernel = ">=7.2.0,<8"
pip = ">=26.0.1,<27"
jupyterlab = ">=4.5.6,<5"
bash_kernel = ">=0.7.2,<0.11"
pixi-kernel = ">=0.7.1,<0.8"
ipywidgets = ">=8.1.8,<9"
matplotlib = ">=3.10.8,<4"
r-irkernel = ">=1.3.2,<2"
r-glmmtmb = ">=1.1.14,<2"
r-tidyverse = ">=2.0.0,<3"
r-ggplot2 = ">=4.0.2,<5"
r-patchwork = ">=1.3.2,<2"
r-tmb = "1.9.19.*"
r-emmeans = ">=2.0.2,<3"
r-ggeffects = ">=2.3.2,<3"
r-broom = ">=1.0.12,<2"
"r-broom.mixed" = ">=0.2.9.7,<0.3"
r-dplyr = ">=1.2.1,<2"
r-easystats = ">=0.7.5,<0.8"
r-dharma = ">=0.4.7,<0.5"
r-car = ">=3.1_5,<4"
r-multcomp = ">=1.4_30,<2"
r-multcompview = ">=0.1_11,<0.2"
r-gt = ">=1.3.0,<2"
r-mgcv = ">=1.9_4,<2"
r-mgcviz = ">=0.2.1,<0.3"

[feature.process.dependencies]
numpy = ">=2.4.2,<3"
matplotlib = ">=3.10.8,<4"
scipy = ">=1.17.1,<2"
gdal = ">=3.12.2,<4"
pyproj = ">=3.7.2,<4"
pandas = ">=3.0.1,<4"
geopandas = ">=1.1.2,<2"
fiona = ">=1.10.1,<2"
verde = ">=1.8.1,<2"
pygeohydro = ">=0.19.4,<0.20"
ipykernel = ">=7.2.0,<8"
gstools = ">=1.7.0,<2"
pykrige = ">=1.7.3,<2"

[feature.process.pypi-dependencies]

[feature.eval.dependencies]
python = "3.10.*"

[feature.eval.pypi-dependencies]

[environments]
process = ["process"]                   
eval    = ["eval"] 
